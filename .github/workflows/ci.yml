name: CI

on:
  push:
    branches: [main]
  pull_request:

# Lint + typecheck gate. The production build + preview deploy are handled by
# Vercel on every push/PR, so CI focuses on the checks Vercel does not block on.
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit
